version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      - run:
          name: Instalar dependencias
          command: npm install

  test:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      - run:
          name: Ejecutar pruebas
          command: npm test

  deploy:
    docker:
      - image: cimg/node:18.0

    steps:
      - run:
          name: Simulación de deploy
          command: echo "Deploy realizado exitosamente"

workflows:
  version: 2

  build_test_deploy:
    jobs:
      - build

      - test:
          requires:
            - build

      - deploy:
          requires:
            - test